# POKY_BBLAYERS_CONF_VERSION is increased each time build/conf/bblayers.conf
# changes incompatibly
POKY_BBLAYERS_CONF_VERSION = "2"

BBPATH = "${TOPDIR}"
BBFILES ?= ""

BBLAYERS ?= " \
  /home/vboxuser/project_image/poky/meta \
  /home/vboxuser/project_image/poky/meta-poky \
  /home/vboxuser/project_image/poky/meta-yocto-bsp \
  /home/vboxuser/project_image/meta-openembedded/meta-oe \
  /home/vboxuser/project_image/meta-raspberrypi \
  /home/vboxuser/project_image/meta-vibration \
  /home/vboxuser/project_image/meta-tensorflow-lite \
  /home/vboxuser/project_image/meta-openembedded/meta-python \
  "
